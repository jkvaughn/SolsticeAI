name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_PROJECT_ID: ci-placeholder
          VITE_SUPABASE_ANON_KEY: ci-placeholder
          VITE_SUPABASE_FUNCTION_NAME: ci-placeholder
          VITE_MAPBOX_TOKEN: ci-placeholder
